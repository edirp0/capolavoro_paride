<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CATCH IT — v8</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
:root { --cyan:#00ffcc; --pink:#ff2d78; --gold:#ffd600; --bg:#07071a; }
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
html,body {
  width:100%; height:100%; background:var(--bg);
  overflow:hidden; touch-action:none;
  user-select:none; -webkit-user-select:none;
}
body {
  background-image:
    radial-gradient(circle at 15% 25%,#0d1b5a55 0%,transparent 50%),
    radial-gradient(circle at 85% 75%,#1a0a3a55 0%,transparent 50%),
    radial-gradient(1px 1px at 10% 20%,#fff4 0%,transparent 100%),
    radial-gradient(1px 1px at 35% 55%,#fff3 0%,transparent 100%),
    radial-gradient(1px 1px at 65% 15%,#fff3 0%,transparent 100%),
    radial-gradient(1px 1px at 80% 80%,#fff2 0%,transparent 100%),
    radial-gradient(1px 1px at 50% 90%,#fff3 0%,transparent 100%);
}
#wrapper {
  position:fixed; width:420px; height:620px;
  transform-origin:top left;
}
canvas {
  display:block;
  border:2px solid rgba(0,255,204,0.3);
  border-radius:6px;
  box-shadow:0 0 30px #00ffcc22,0 0 80px #00ffcc0e;
  background:#07071a;
  -webkit-touch-callout:none;
}
#controls {
  display:none; position:fixed; bottom:10px;
  left:50%; transform:translateX(-50%);
  gap:20px; z-index:10;
}
.btn-arrow {
  width:74px; height:74px; border-radius:50%;
  border:2px solid var(--cyan);
  background:rgba(0,255,204,0.07);
  color:var(--cyan); font-size:30px;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; box-shadow:0 0 14px #00ffcc22;
  transition:background .08s,transform .08s;
  -webkit-tap-highlight-color:transparent;
}
.btn-arrow.pressed,.btn-arrow:active {
  background:rgba(0,255,204,0.22); transform:scale(0.91);
}
@media (hover:none) and (pointer:coarse) { #controls { display:flex; } }
</style>
</head>
<body>
<div id="wrapper">
  <canvas id="gameCanvas" width="420" height="620"></canvas>
</div>
<div id="controls">
  <button class="btn-arrow" id="btnLeft"  aria-label="Sinistra">◀</button>
  <button class="btn-arrow" id="btnRight" aria-label="Destra">▶</button>
</div>
<script>
// ════════════════════════════════════════════════════════════════
//  SETUP
// ════════════════════════════════════════════════════════════════
const wrapper = document.getElementById('wrapper');
const canvas  = document.getElementById('gameCanvas');
const ctx     = canvas.getContext('2d');
const CW = 420, CH = 620;

function scaleCanvas() {
  const isTouch = window.matchMedia('(hover:none) and (pointer:coarse)').matches;
  const reservedH = isTouch ? 108 : 0;
  const s = Math.min(window.innerWidth/CW, (window.innerHeight-reservedH)/CH, isTouch?1.0:1.5);
  const scaledW = CW*s, scaledH = CH*s;
  wrapper.style.left      = `${(window.innerWidth-scaledW)/2}px`;
  wrapper.style.top       = `${(window.innerHeight-reservedH-scaledH)/2}px`;
  wrapper.style.transform = `scale(${s})`;
  window._gs = s; 
}
window.addEventListener('resize', scaleCanvas);
scaleCanvas();

function clientToCanvas(cx,cy) {
  const r=canvas.getBoundingClientRect(), s=window._gs||1;
  return { x:(cx-r.left)/s, y:(cy-r.top)/s };
}

// ════════════════════════════════════════════════════════════════
//  DIFFICOLTÀ — configurazione per ogni modalità
// ════════════════════════════════════════════════════════════════
const DIFF = {
  facile: {
    label:'FACILE', color:'#00e676', emoji:'😊',
    velBase:2.2, velIncr:0.12, ptsLevelUp:15,
    maxItems:3, itemsStep:3,      
    bombProb:0.08, geloProb:0.05, velenoProb:0.04,
    barW:100,                     
    desc:['VELOCITÀ LENTA','MAX 3 OGGETTI','BARRA GRANDE']
  },
  normale: {
    label:'NORMALE', color:'#ffd600', emoji:'😐',
    velBase:3.0, velIncr:0.18, ptsLevelUp:10,
    maxItems:4, itemsStep:2,
    bombProb:0.15, geloProb:0.09, velenoProb:0.08,
    barW:84,
    desc:['VELOCITÀ MEDIA','MAX 4 OGGETTI','BARRA STANDARD']
  },
  difficile: {
    label:'DIFFICILE', color:'#ff8c00', emoji:'😤',
    velBase:4.2, velIncr:0.28, ptsLevelUp:8,
    maxItems:5, itemsStep:2,
    bombProb:0.22, geloProb:0.12, velenoProb:0.11,
    barW:68,
    desc:['VELOCITÀ ALTA','MAX 5 OGGETTI','BARRA PICCOLA']
  },
  impossibile: {
    label:'IMPOSSIBILE', color:'#ff2d78', emoji:'💀',
    velBase:5.5, velIncr:0.40, ptsLevelUp:6,
    maxItems:6, itemsStep:1,
    bombProb:0.28, geloProb:0.16, velenoProb:0.14,
    barW:52,
    desc:['VELOCITÀ BRUTALE','MAX 6 OGGETTI','BARRA MINUSCOLA']
  }
};
const DIFF_KEYS = ['facile','normale','difficile','impossibile'];

// ════════════════════════════════════════════════════════════════
//  CONFIGURAZIONE NUOVE MODALITÀ
// ════════════════════════════════════════════════════════════════
const MODES = {
  classica: {
    label: 'CLASSICA', color: '#00ffcc', emoji: '🕹️',
    desc: ['MODALITÀ STANDARD', 'SALI DI LIVELLO', 'COMPLETANDO I BLOCCHI']
  },
  infinita: {
    label: 'INFINITO', color: '#ffd600', emoji: '♾️',
    desc: ['LIVELLI INFINITI', 'VELOCITÀ CRESCENTE', 'AD OLTRANZA SENZA PAUSE!']
  },
  timeattack: {
    label: 'TIME ATTACK', color: '#ff2d78', emoji: '⏳',
    desc: ['CORSA CONTRO IL TEMPO', 'STELLE BONUS (+3s)', 'LE BOMBE TOLGONO (-5s)']
  },
  muro: {
    label: 'MURO BOMBE', color: '#aa00ff', emoji: '💥',
    desc: ['SPAWN BOMBE MASSICCIO', 'RIFLESSI FULMINEI', 'PUNTI TRIPLICATI!']
  }
};
const MOD_KEYS = ['classica', 'infinita', 'timeattack', 'muro'];

// ════════════════════════════════════════════════════════════════
//  STATO GLOBALE
// ════════════════════════════════════════════════════════════════
let combo = 0;
let scudoAttivo = false;
let magnetTimer = 0;
let gemme = parseInt(localStorage.getItem('catchit_gemme') || '0');

// Schermate: START | MODE | DIFFICULTY | SETTINGS | TUTORIAL | GIOCO | PAUSA | LEVELUP | GAMEOVER | LEADERBOARD
let stato        = 'START';
let modalitaScelta = 'classica';
let modeIdx      = 0;
let diffScelta   = 'normale';   
let diffIdx      = 1;           
let punteggio    = 0;
let highScore    = 0;
let vite         = 3;
let livello      = 1;
let tempoResiduo = 60;
let keys         = {};
let particelle   = [];
let floatTesti   = [];
let flashTimer   = 0;
let screenShake  = 0;
let freezeTimer  = 0;
let freezeVfx    = 0;
let slowTimer    = 0;
let levelUpTimer = 0;
let levelUpAnim  = 0;
let touchStartX  = null;
let plSensitivity = 7;

let leaderboard = JSON.parse(localStorage.getItem('catchit_lb6') || '[]');

// ════════════════════════════════════════════════════════════════
//  PLAYER
// ════════════════════════════════════════════════════════════════
const player = { x:0, y:CH-42, w:84, h:14, frozen:false };

function resetPlayer() {
  const d = DIFF[diffScelta];
  player.w = d.barW;
  player.x = CW/2 - player.w/2;
  player.frozen = false;
}

// ════════════════════════════════════════════════════════════════
//  TIPI OGGETTO 
// ════════════════════════════════════════════════════════════════
const TIPI_BASE = {
  normale: { color:'#00e676', size:[18,26], label:'' },
  bonus:   { color:'#ffd600', size:[20,24], label:'★' },
  bomba:   { color:'#ff4400', size:[22,26], label:'💣' },
  gelo:    { color:'#88ddff', size:[20,24], label:'❄' },
  veleno:  { color:'#aa00ff', size:[18,22], label:'☠' },
  scudo:   { color:'#4488ff', size:[20,24], label:'🛡️' },
  calamita:{ color:'#ff0055', size:[20,24], label:'🧲' },
  gemma:   { color:'#ff00ff', size:[16,20], label:'💎' }
};

function sorteggiaTipo() {
  const d = DIFF[diffScelta];
  let pBomba  = d.bombProb;
  
  // Modificatore per modalità Muro di Bombe
  if (modalitaScelta === 'muro') {
    pBomba = Math.min(0.55, pBomba + 0.18);
  }

  const pGelo   = d.geloProb;
  const pVeleno = d.velenoProb;
  const pBonus  = 0.12;
  const pScudo  = 0.04;
  const pCalamita = 0.04;
  const pGemma  = 0.03;
  
  const pNorm   = Math.max(0, 1 - (pBomba+pGelo+pVeleno+pBonus+pScudo+pCalamita+pGemma));
  
  const pool = [
    ['normale', pNorm], ['bonus', pBonus], ['bomba', pBomba],
    ['gelo', pGelo], ['veleno', pVeleno], ['scudo', pScudo],
    ['calamita', pCalamita], ['gemma', pGemma]
  ];
  let r = Math.random(), acc = 0;
  for (const [k,p] of pool) { acc+=p; if (r<acc) return k; }
  return 'normale';
}

// ════════════════════════════════════════════════════════════════
//  ITEMS
// ════════════════════════════════════════════════════════════════
let items = [];

function creaItem(speedOverride) {
  const d    = DIFF[diffScelta];
  const tipo = sorteggiaTipo();
  const tb   = TIPI_BASE[tipo];
  const sz   = tb.size[0] + Math.random()*(tb.size[1]-tb.size[0]);
  return {
    x:     Math.random()*(CW-sz),
    y:     -sz - Math.random()*80,
    size:  sz,
    speed: speedOverride || (d.velBase + (livello-1)*0.5),
    color: tb.color,
    tipo,
    label: tb.label
  };
}

function numItems() {
  const d = DIFF[diffScelta];
  return Math.min(1 + Math.floor((livello-1)/d.itemsStep), d.maxItems);
}

function spawnItems() {
  items = [];
  const spazioMinimo = player.w + 10; 

  for (let i = 0; i < numItems(); i++) {
    let newItem;
    let posizioneSicura = false;
    let tentativi = 0;

    while (!posizioneSicura && tentativi < 10) {
      newItem = creaItem();
      let sovrapposto = items.some(it => Math.abs(it.x - newItem.x) < spazioMinimo);
      if (!sovrapposto) posizioneSicura = true;
      tentativi++;
    }
    items.push(newItem);
  }
}

// ════════════════════════════════════════════════════════════════
//  INPUT TASTIERA
// ════════════════════════════════════════════════════════════════
window.addEventListener('keydown', e => {
  keys[e.key]=true;
  const blk=[' ','ArrowLeft','ArrowRight','ArrowUp','ArrowDown','a','A','d','D','w','W','s','S'];
  if (blk.includes(e.key)) e.preventDefault();

  switch(stato) {
    case 'START':
      if (e.key==='o'||e.key==='O') { cambiaStato('SETTINGS'); return; }
      cambiaStato('MODE'); return;
    case 'MODE':
      if (e.key==='ArrowLeft'||e.key==='a'||e.key==='A')  { modeIdx=(modeIdx-1+4)%4; modalitaScelta=MOD_KEYS[modeIdx]; }
      if (e.key==='ArrowRight'||e.key==='d'||e.key==='D') { modeIdx=(modeIdx+1)%4;   modalitaScelta=MOD_KEYS[modeIdx]; }
      if (e.key===' '||e.key==='Enter') { cambiaStato('DIFFICULTY'); }
      if (e.key==='Escape') cambiaStato('START');
      return;
    case 'DIFFICULTY':
      if (e.key==='ArrowLeft'||e.key==='a'||e.key==='A')  { diffIdx=(diffIdx-1+4)%4; diffScelta=DIFF_KEYS[diffIdx]; }
      if (e.key==='ArrowRight'||e.key==='d'||e.key==='D') { diffIdx=(diffIdx+1)%4;   diffScelta=DIFF_KEYS[diffIdx]; }
      if (e.key===' '||e.key==='Enter') { cambiaStato('TUTORIAL'); }
      if (e.key==='Escape') cambiaStato('MODE');
      return;
    case 'SETTINGS':
      _settingsKey(e.key); return;
    case 'TUTORIAL':
      iniziaGioco(); return;
    case 'GAMEOVER':
      cambiaStato('LEADERBOARD'); return;
    case 'LEADERBOARD':
      cambiaStato('START'); return;
    case 'LEVELUP': return;
    case 'GIOCO':
      if (e.key==='Escape'||e.key==='p'||e.key==='P') cambiaStato('PAUSA');
      return;
    case 'PAUSA':
      if (e.key==='Escape'||e.key==='p'||e.key==='P'||e.key===' ') cambiaStato('GIOCO');
      return;
  }
});
window.addEventListener('keyup', e => keys[e.key]=false);

// ════════════════════════════════════════════════════════════════
//  INPUT TOUCH
// ════════════════════════════════════════════════════════════════
canvas.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  const {x:tx,y:ty} = clientToCanvas(e.touches[0].clientX, e.touches[0].clientY);

  switch(stato) {
    case 'START':
      if (tx>=CW/2-80&&tx<=CW/2+80&&ty>=448&&ty<=478) { cambiaStato('SETTINGS'); return; }
      cambiaStato('MODE'); return;
    case 'MODE':
      if (tx<CW/3)   { modeIdx=(modeIdx-1+4)%4; modalitaScelta=MOD_KEYS[modeIdx]; return; }
      if (tx>CW*2/3) { modeIdx=(modeIdx+1)%4;   modalitaScelta=MOD_KEYS[modeIdx]; return; }
      if (ty>CH-120) { cambiaStato('DIFFICULTY'); return; }
      return;
    case 'DIFFICULTY':
      if (tx<CW/3)   { diffIdx=(diffIdx-1+4)%4; diffScelta=DIFF_KEYS[diffIdx]; return; }
      if (tx>CW*2/3) { diffIdx=(diffIdx+1)%4;   diffScelta=DIFF_KEYS[diffIdx]; return; }
      if (ty>CH-120) { cambiaStato('TUTORIAL'); return; }
      return;
    case 'SETTINGS':
      _settingsTap(e.touches[0].clientX, e.touches[0].clientY); return;
    case 'TUTORIAL':   iniziaGioco();              return;
    case 'GAMEOVER':   cambiaStato('LEADERBOARD'); return;
    case 'LEADERBOARD':cambiaStato('START');        return;
    case 'PAUSA':      cambiaStato('GIOCO');        return;
  }
}, {passive:true});

canvas.addEventListener('touchmove', e => {
  if (touchStartX===null||stato!=='GIOCO'||freezeTimer>0) return;
  const s=window._gs||1;
  // Ora la sensibilità impostata agisce sul moltiplicatore dello spostamento touch
  const dx=((e.touches[0].clientX-touchStartX)/s) * (plSensitivity / 7);
  player.x=Math.max(0,Math.min(CW-player.w,player.x+dx));
  touchStartX=e.touches[0].clientX;
},{passive:true});

canvas.addEventListener('touchend',()=>{ touchStartX=null; });

// ════════════════════════════════════════════════════════════════
//  BOTTONI FRECCIA (touch)
// ════════════════════════════════════════════════════════════════
const btnL=document.getElementById('btnLeft');
const btnR=document.getElementById('btnRight');
['touchstart','mousedown'].forEach(ev=>{
  btnL.addEventListener(ev,e=>{
    e.preventDefault(); keys['ArrowLeft']=true; btnL.classList.add('pressed');
    if (stato==='MODE') { modeIdx=(modeIdx-1+4)%4; modalitaScelta=MOD_KEYS[modeIdx]; }
    if (stato==='DIFFICULTY') { diffIdx=(diffIdx-1+4)%4; diffScelta=DIFF_KEYS[diffIdx]; }
  },{passive:false});
  btnR.addEventListener(ev,e=>{
    e.preventDefault(); keys['ArrowRight']=true; btnR.classList.add('pressed');
    if (stato==='MODE') { modeIdx=(modeIdx+1)%4;   modalitaScelta=MOD_KEYS[modeIdx]; }
    if (stato==='DIFFICULTY') { diffIdx=(diffIdx+1)%4; diffScelta=DIFF_KEYS[diffIdx]; }
  },{passive:false});
});
['touchend','touchcancel','mouseup','mouseleave'].forEach(ev=>{
  btnL.addEventListener(ev,()=>{ keys['ArrowLeft']=false;  btnL.classList.remove('pressed'); });
  btnR.addEventListener(ev,()=>{ keys['ArrowRight']=false; btnR.classList.remove('pressed'); });
});

// ════════════════════════════════════════════════════════════════
//  SETTINGS — slider sensibilità
// ════════════════════════════════════════════════════════════════
const SMIN=2, SMAX=16;
const SL={x:60,y:310,w:300,h:12,r:6};
let _sdrag=false;

function _sensToFrac(v){return (v-SMIN)/(SMAX-SMIN);}
function _fracToSens(f){return Math.round(SMIN+f*(SMAX-SMIN));}

function _settingsKey(k) {
  if (k==='ArrowLeft'||k==='a'||k==='A')  plSensitivity=Math.max(SMIN,plSensitivity-1);
  if (k==='ArrowRight'||k==='d'||k==='D') plSensitivity=Math.min(SMAX,plSensitivity+1);
  if (k==='Escape'||k==='Enter'||k===' ') cambiaStato('START');
}

function _settingsTap(cx,cy) {
  const {x,y}=clientToCanvas(cx,cy);
  if (x>=SL.x&&x<=SL.x+SL.w&&y>=SL.y-22&&y<=SL.y+SL.h+22) {
    plSensitivity=_fracToSens(Math.max(0,Math.min(1,(x-SL.x)/SL.w)));
  } else if (y>CH-100) cambiaStato('START');
}

canvas.addEventListener('touchstart',e=>{
  if (stato!=='SETTINGS') return;
  const {x,y}=clientToCanvas(e.touches[0].clientX,e.touches[0].clientY);
  if (x>=SL.x&&x<=SL.x+SL.w&&y>=SL.y-24&&y<=SL.y+SL.h+24) _sdrag=true;
},{passive:true});
canvas.addEventListener('touchmove',e=>{
  if (stato!=='SETTINGS'||!_sdrag) return;
  const {x}=clientToCanvas(e.touches[0].clientX,e.touches[0].clientY);
  plSensitivity=_fracToSens(Math.max(0,Math.min(1,(x-SL.x)/SL.w)));
},{passive:true});
canvas.addEventListener('touchend',()=>_sdrag=false);

canvas.addEventListener('mousedown',e=>{
  if (stato!=='SETTINGS') return;
  const {x,y}=clientToCanvas(e.clientX,e.clientY);
  if (x>=SL.x&&x<=SL.x+SL.w&&y>=SL.y-20&&y<=SL.y+SL.h+20) {
    _sdrag=true;
    plSensitivity=_fracToSens(Math.max(0,Math.min(1,(x-SL.x)/SL.w)));
  }
});
window.addEventListener('mousemove',e=>{
  if (stato!=='SETTINGS'||!_sdrag) return;
  const {x}=clientToCanvas(e.clientX,e.clientY);
  plSensitivity=_fracToSens(Math.max(0,Math.min(1,(x-SL.x)/SL.w)));
});
window.addEventListener('mouseup',()=>_sdrag=false);

// ════════════════════════════════════════════════════════════════
//  LOGICA GIOCO
// ════════════════════════════════════════════════════════════════
function cambiaStato(s){ stato=s; }

function iniziaGioco() {
  punteggio=0; livello=1;
  tempoResiduo=60;
  vite = modalitaScelta === 'timeattack' ? 999 : 3; 
  freezeTimer=0; slowTimer=0; magnetTimer=0; scudoAttivo=false; combo=0;
  particelle=[]; floatTesti=[];
  resetPlayer();
  spawnItems();
  cambiaStato('GIOCO');
}

function salvaScore() {
  const lblMod = modalitaScelta.toUpperCase();
  leaderboard.push({
    pts:punteggio, lv:livello,
    diff:DIFF[diffScelta].label + " (" + lblMod + ")",
    data:new Date().toLocaleDateString('it-IT')
  });
  leaderboard.sort((a,b)=>b.pts-a.pts);
  leaderboard=leaderboard.slice(0,5);
  localStorage.setItem('catchit_lb6',JSON.stringify(leaderboard));
}

function spawnParticelle(x,y,color,n=12) {
  for(let i=0;i<n;i++){
    const a=(Math.PI*2/n)*i+Math.random()*0.4;
    const v=2.5+Math.random()*3.5;
    particelle.push({x,y,vx:Math.cos(a)*v,vy:Math.sin(a)*v-2,
      life:1,decay:0.03+Math.random()*0.025,size:3+Math.random()*4,color});
  }
}
function spawnFloat(x,y,text,color){
  floatTesti.push({x,y,text,color,life:1,vy:-1.5});
}

function update() {
  if (stato==='LEVELUP') {
    levelUpTimer--;
    levelUpAnim=Math.min(levelUpAnim+0.06,1);
    if (levelUpTimer<=0) {
      livello++;
      spawnItems();
      cambiaStato('GIOCO');
      levelUpAnim=0;
    }
    aggiornaParticelle();
    return;
  }
  if (stato!=='GIOCO') return;

  if (modalitaScelta === 'timeattack') {
    tempoResiduo -= 1/60;
    if (tempoResiduo <= 0) {
      tempoResiduo = 0;
      salvaScore();
      cambiaStato('GAMEOVER');
      return;
    }
  }

  if(flashTimer>0)  flashTimer--;
  if(screenShake>0) screenShake--;
  if(freezeVfx>0)   freezeVfx--;
  if(freezeTimer>0){freezeTimer--;player.frozen=true;}else{player.frozen=false;}
  if(slowTimer>0)   slowTimer--;
  if(magnetTimer>0) magnetTimer--;

  // Movimento player tastiera
  if (!player.frozen) {
    if ((keys['ArrowLeft'] ||keys['a']||keys['A'])&&player.x>0)          player.x-=plSensitivity;
    if ((keys['ArrowRight']||keys['d']||keys['D'])&&player.x<CW-player.w) player.x+=plSensitivity;
  }

  const speedMult = slowTimer>0 ? 0.45 : 1;

  for (let i=items.length-1;i>=0;i--) {
    const it=items[i];
    it.y += it.speed * speedMult;

    // BOMBE A ONDA (dal livello 3 in poi)
    if (it.tipo === 'bomba' && livello >= 3) {
      it.x += Math.sin(it.y / 40) * (0.5 + livello*0.1); 
      it.x = Math.max(0, Math.min(CW - it.size, it.x)); 
    }

    // CALAMITA
    if (magnetTimer > 0 && (it.tipo === 'normale' || it.tipo === 'bonus' || it.tipo === 'gemma')) {
      const targetX = player.x + (player.w / 2) - (it.size / 2);
      it.x += (targetX - it.x) * 0.08; 
    }

    // Collisione
    if (it.y+it.size>=player.y&&it.y<=player.y+player.h&&
        it.x+it.size>=player.x&&it.x<=player.x+player.w) {
      gestisci(it,i); continue;
    }
    // Fondo
    if (it.y>CH) {
      if (it.tipo==='normale'||it.tipo==='bonus'||it.tipo==='gemma') {
        combo = 0; 
        perdiVita();
        if (stato==='GAMEOVER') return;
      }
      items.splice(i,1);
      items.push(creaItem(it.speed));
    }
  }

  // Level up check standard (solo per Classica e Muro di Bombe)
  if (modalitaScelta === 'classica' || modalitaScelta === 'muro') {
    const d=DIFF[diffScelta];
    if (punteggio>0&&punteggio%d.ptsLevelUp===0) {
      const target=Math.floor(punteggio/d.ptsLevelUp)+1;
      if (target>livello) {
        levelUpTimer=110; levelUpAnim=0;
        cambiaStato('LEVELUP');
        spawnParticelle(CW/2,CH/2,'#ffd600',30);
      }
    }
  }
  aggiornaParticelle();
}

function gestisci(it,idx) {
  const cx=it.x+it.size/2, cy=player.y;
  items.splice(idx,1);
  const d=DIFF[diffScelta];
  items.push(creaItem(it.speed+d.velIncr));

  let moltiplicatore = 1 + Math.floor(combo / 5);
  if (modalitaScelta === 'muro') moltiplicatore *= 3; // Punti triplicati nel muro di bombe!

  switch(it.tipo) {
    case 'normale':
      combo++;
      const ptNorm = (1 + Math.floor((livello-1)*0.5)) * moltiplicatore;
      punteggio += ptNorm; 
      if(punteggio>highScore) highScore=punteggio;
      spawnParticelle(cx,cy,it.color);
      spawnFloat(cx,cy-10, moltiplicatore > 1 ? `+${ptNorm} (x${moltiplicatore})` : `+${ptNorm}`, '#00e676'); 
      break;

    case 'bonus':
      combo++;
      const ptBonus = (3 + livello) * moltiplicatore;
      punteggio += ptBonus; 
      if(punteggio>highScore) highScore=punteggio;
      if (modalitaScelta === 'timeattack') {
        tempoResiduo += 3;
        spawnFloat(cx, cy-25, '+3 SEC!', '#ffd600');
      }
      slowTimer=180;
      spawnParticelle(cx,cy,'#ffd600',20);
      spawnFloat(cx,cy-10,`+${ptBonus} ★`,'#ffd600'); 
      break;

    case 'gemma':
      combo++;
      gemme++;
      localStorage.setItem('catchit_gemme', gemme);
      spawnParticelle(cx,cy,'#ff00ff',15);
      spawnFloat(cx,cy-10,'+1 💎','#ff00ff');
      break;

    case 'scudo':
      combo++;
      scudoAttivo = true;
      spawnParticelle(cx,cy,'#4488ff',15);
      spawnFloat(cx,cy-10,'SCUDO ATTIVO!','#4488ff');
      break;

    case 'calamita':
      combo++;
      magnetTimer = 300; 
      spawnParticelle(cx,cy,'#ff0055',15);
      spawnFloat(cx,cy-10,'ATTRAZIONE!','#ff0055');
      break;

    case 'bomba':
      if (scudoAttivo) {
        scudoAttivo = false;
        spawnParticelle(cx,cy,'#4488ff',20);
        spawnFloat(cx,cy-10,'BLOCCATA! 🛡️','#4488ff');
      } else {
        combo = 0; 
        spawnParticelle(cx,cy,'#ff4400',18);
        spawnFloat(cx,cy-10, modalitaScelta === 'timeattack'?' -5 SEC!':'BOMBA! -♥','#ff4400');
        perdiVita(); 
      }
      break;

    case 'gelo':
      if (scudoAttivo) {
         scudoAttivo = false;
         spawnFloat(cx,cy-10,'GELO BLOCCATO!','#4488ff');
      } else {
         combo = 0;
         freezeTimer=90; freezeVfx=90;
         spawnParticelle(cx,cy,'#88ddff',14);
         spawnFloat(cx,cy-10,'FREEZE!','#88ddff'); 
      }
      break;

    case 'veleno':
      if (scudoAttivo) {
         scudoAttivo = false;
         spawnFloat(cx,cy-10,'VELENO BLOCCATO!','#4488ff');
      } else {
         combo = 0;
         punteggio=Math.floor(punteggio/2);
         screenShake=14; flashTimer=22;
         spawnParticelle(cx,cy,'#aa00ff',16);
         spawnFloat(cx,cy-10,'÷2 ☠','#aa00ff'); 
      }
      break;
  }

  // Avanzamento continuo ed oltranza ad incrementi fluidi per Infinito e Time Attack
  if (modalitaScelta === 'infinita' || modalitaScelta === 'timeattack') {
    const milestone = modalitaScelta === 'timeattack' ? 12 : d.ptsLevelUp;
    if (punteggio > 0 && Math.floor(punteggio / milestone) + 1 > livello) {
      livello++;
      spawnFloat(CW/2, CH/2 - 50, `LIVELLO ${livello}!`, '#00ffcc');
      spawnParticelle(CW/2, CH/2 - 50, '#00ffcc', 14);
      if (items.length < d.maxItems) {
        items.push(creaItem());
      }
    }
  }
}

function perdiVita(){
  if (modalitaScelta === 'timeattack') {
    tempoResiduo = Math.max(0, tempoResiduo - 5);
    flashTimer=20; screenShake=12;
    if (tempoResiduo <= 0) { salvaScore(); cambiaStato('GAMEOVER'); }
    return;
  }
  vite--; flashTimer=20; screenShake=12;
  if(vite<=0){salvaScore();cambiaStato('GAMEOVER');}
}

function aggiornaParticelle(){
  for(let i=particelle.length-1;i>=0;i--){
    const p=particelle[i];
    p.x+=p.vx;p.y+=p.vy;p.vy+=0.18;p.life-=p.decay;
    if(p.life<=0)particelle.splice(i,1);
  }
  for(let i=floatTesti.length-1;i>=0;i--){
    const t=floatTesti[i];
    t.y+=t.vy;t.life-=0.025;
    if(t.life<=0)floatTesti.splice(i,1);
  }
}

// ════════════════════════════════════════════════════════════════
//  HELPERS GRAFICI
// ════════════════════════════════════════════════════════════════
function roundRect(x,y,w,h,r){
  if(w<=0)return;
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}
function gText(text,x,y,size,color,blur=12,align='center'){
  ctx.font=`${size}px 'Press Start 2P',monospace`;
  ctx.fillStyle=color; ctx.shadowColor=color; ctx.shadowBlur=blur;
  ctx.textAlign=align; ctx.fillText(text,x,y); ctx.shadowBlur=0;
}
function blink(ms=550){return Math.floor(Date.now()/ms)%2===0;}
function sfondoGriglia(a=0.04){
  ctx.strokeStyle=`rgba(0,255,204,${a})`; ctx.lineWidth=1;
  for(let x=0;x<CW;x+=30){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,CH);ctx.stroke();}
  for(let y=0;y<CH;y+=30){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(CW,y);ctx.stroke();}
}
function pannello(x,y,w,h,r,ba=0.3){
  roundRect(x,y,w,h,r);
  ctx.fillStyle='rgba(0,255,204,0.05)';ctx.fill();
  ctx.strokeStyle=`rgba(0,255,204,${ba})`;ctx.lineWidth=1.5;ctx.stroke();
}
function disegnaParticelle(){
  particelle.forEach(p=>{
    ctx.globalAlpha=p.life;ctx.fillStyle=p.color;ctx.shadowColor=p.color;ctx.shadowBlur=8;
    ctx.beginPath();ctx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2);ctx.fill();
  });
  floatTesti.forEach(t=>{
    ctx.globalAlpha=t.life;
    gText(t.text,t.x,t.y,9,t.color,10);
  });
  ctx.globalAlpha=1;ctx.shadowBlur=0;
}
function disegnaVite(x,y){
  for(let i=0; i<3; i++){
    ctx.globalAlpha=i<vite?1:0.18;
    ctx.font='16px serif';ctx.textAlign='left';ctx.fillText('♥',x+i*22,y);
  }
  ctx.globalAlpha=1;
}

  ctx.fillStyle='rgba(0,255,204,0.1)';ctx.fillRect(34,116,CW-68,1);

  const voci=[
    ['⭐','#ffd600','+3 PTS / AGGIUNGE TEMPO IN TA'],
    ['■','#00e676','+1 PUNTO (non perderli!)'],
    ['💣','#ff4400','EVITA! DANNO / -5s IN TA'],
    ['❄','#88ddff','EVITA! CONGELA IL PLAYER'],
    ['☠','#aa00ff','EVITA! PUNTEGGIO DIMEZZATO'],
  ];
  voci.forEach(([e,c,t],i)=>{
    const y=140+i*58;
    ctx.font=e.length===1&&e!=='■'?'22px serif':"16px 'Press Start 2P',monospace";
    ctx.textAlign='left';ctx.fillStyle=c;ctx.fillText(e,44,y);
    ctx.font="7px 'Press Start 2P',monospace";
    ctx.fillStyle=c;ctx.shadowColor=c;ctx.shadowBlur=8;
    ctx.fillText(t,78,y-4);ctx.shadowBlur=0;
  });

  ctx.fillStyle='rgba(0,255,204,0.1)';ctx.fillRect(34,CH-110,CW-68,1);
  ctx.font="7px 'Press Start 2P',monospace";ctx.textAlign='center';
  ctx.fillStyle='rgba(255,255,255,0.35)';
  ctx.fillText('← → / A D / TRASCINA DITO',CW/2,CH-80);
  ctx.fillText('P  =  PAUSA',CW/2,CH-56);

  if(blink()){gText('[ TAP PER GIOCARE ]',CW/2,CH-24,8,'#00ffcc',8);}
}

// ════════════════════════════════════════════════════════════════
//  SCREEN: GIOCO
// ════════════════════════════════════════════════════════════════
function drawGioco(){
  const sx=screenShake>0?(Math.random()-.5)*6:0;
  const sy=screenShake>0?(Math.random()-.5)*6:0;
  ctx.save();ctx.translate(sx,sy);

  ctx.fillStyle='rgba(7,7,26,0.80)';ctx.fillRect(-10,-10,CW+20,CH+20);

  if(flashTimer>0){ctx.fillStyle=`rgba(255,30,30,${flashTimer/20*0.20})`;ctx.fillRect(-10,-10,CW+20,CH+20);}
  if(freezeVfx>0){
    ctx.fillStyle=`rgba(100,200,255,${freezeVfx/90*0.12})`;ctx.fillRect(-10,-10,CW+20,CH+20);
    ctx.strokeStyle=`rgba(136,221,255,${freezeVfx/90*0.5})`;ctx.lineWidth=6;ctx.strokeRect(2,2,CW-4,CH-4);ctx.lineWidth=1;
  }
  if(slowTimer>0&&blink(400)){ctx.fillStyle='rgba(255,220,0,0.04)';ctx.fillRect(-10,-10,CW+20,CH+20);}

  // Items
  items.forEach(it=>{
    ctx.shadowColor=it.color;ctx.shadowBlur=18;ctx.fillStyle=it.color;
    roundRect(it.x,it.y,it.size,it.size,4);ctx.fill();
    ctx.shadowBlur=0;ctx.fillStyle='rgba(255,255,255,0.22)';
    roundRect(it.x+3,it.y+3,it.size*.42,it.size*.42,2);ctx.fill();
    if(it.label){ctx.font='14px serif';ctx.textAlign='center';ctx.fillText(it.label,it.x+it.size/2,it.y+it.size/2+5);}
  });

  // Player
  const pc=player.frozen?'#88ddff':'#00ffcc';
  ctx.shadowColor=pc;ctx.shadowBlur=22;ctx.fillStyle=pc;
  roundRect(player.x,player.y,player.w,player.h,6);ctx.fill();
  ctx.shadowBlur=0;ctx.fillStyle='rgba(255,255,255,0.28)';
  roundRect(player.x+6,player.y+2,player.w-12,4,2);ctx.fill();
  if(player.frozen){ctx.font='10px serif';ctx.textAlign='center';ctx.fillText('❄',player.x+player.w/2,player.y-4);}
  
  if(scudoAttivo) {
    ctx.strokeStyle = '#4488ff'; ctx.lineWidth = 3; ctx.shadowColor = '#4488ff'; ctx.shadowBlur = 10;
    ctx.beginPath();
    ctx.arc(player.x + player.w/2, player.y + player.h/2, player.w/2 + 8, 0, Math.PI * 2);
    ctx.stroke(); ctx.shadowBlur = 0;
  }

  // Linea pericolo
  ctx.strokeStyle='rgba(255,50,50,0.15)';ctx.lineWidth=1;
  ctx.setLineDash([5,8]);
  ctx.beginPath();ctx.moveTo(0,player.y+player.h+5);ctx.lineTo(CW,player.y+player.h+5);ctx.stroke();
  ctx.setLineDash([]);

  disegnaParticelle();

  // HUD
  const d=DIFF[diffScelta];
  ctx.textAlign='left';
  gText(String(punteggio).padStart(4,'0'),14,36,14,'#00ffcc',12,'left');

  ctx.font="6px 'Press Start 2P',monospace";ctx.fillStyle=d.color;ctx.textAlign='left';
  ctx.shadowColor=d.color;ctx.shadowBlur=6;ctx.fillText(d.label,14,52);ctx.shadowBlur=0;

  ctx.textAlign='right';ctx.font="7px 'Press Start 2P',monospace";
  ctx.fillStyle='rgba(255,214,0,0.55)';
  ctx.fillText('BEST '+String(highScore).padStart(4,'0'),CW-12,24);

  // Intestazione con info della modalità corrente
  ctx.textAlign='center';ctx.font="6px 'Press Start 2P',monospace";
  ctx.fillStyle='rgba(255,255,255,0.2)';
  ctx.fillText(modalitaScelta.toUpperCase() + ' · LV '+livello,CW/2,18);

  // Barra o indicatore specifico per Vite / Tempo Residuo
  if (modalitaScelta === 'timeattack') {
    const colTempo = tempoResiduo < 15 ? 'var(--pink)' : 'var(--gold)';
    gText('TIME ' + tempoResiduo.toFixed(1) + 's', 12, 72, 7, colTempo, 6, 'left');
  } else {
    disegnaVite(12,68);
  }

  // Barra di avanzamento dell'esperienza / livello
  const milestone = modalitaScelta === 'timeattack' ? 12 : d.ptsLevelUp;
  const prog=(punteggio%milestone)/milestone;
  ctx.fillStyle='rgba(255,255,255,0.08)';roundRect(CW/2-50,26,100,5,2);ctx.fill();
  if(prog>0){
    roundRect(CW/2-50,26,100*prog,5,2);
    ctx.fillStyle='rgba(0,255,204,0.5)';ctx.shadowColor='#00ffcc';ctx.shadowBlur=6;ctx.fill();ctx.shadowBlur=0;
  }

  if(slowTimer>0){
    gText('SLOW',CW-66,56,6,'#ffd600',6,'left');
    ctx.fillStyle='rgba(255,214,0,0.28)';roundRect(CW-66,60,54*(slowTimer/180),4,2);ctx.fill();
  }

  if(magnetTimer>0){
    gText('MAG',CW-66,74,6,'#ff0055',6,'left');
    ctx.fillStyle='rgba(255,0,85,0.28)';
    roundRect(CW-66,78,54*(magnetTimer/300),4,2);ctx.fill();
  }

  const molt = 1 + Math.floor(combo / 5);
  if (molt > 1) {
    ctx.textAlign='center';
    gText(`COMBO x${molt}`, CW/2, 52, 8, '#ff2d78', 10);
  }
  
  ctx.font="6px 'Press Start 2P',monospace";ctx.fillStyle='rgba(255,255,255,0.15)';
  ctx.textAlign='right';ctx.fillText('[P] PAUSA',CW-12,CH-12);

  ctx.textAlign='left'; ctx.font="7px 'Press Start 2P',monospace"; ctx.fillStyle='#ff00ff';
  ctx.fillText(`💎 ${gemme}`, 14, CH-12);

  ctx.restore();
}

// ════════════════════════════════════════════════════════════════
//  SCREEN: PAUSA
// ════════════════════════════════════════════════════════════════
function drawPausa(){
  ctx.fillStyle='rgba(7,7,26,0.92)';ctx.fillRect(0,0,CW,CH);
  pannello(CW/2-120,CH/2-120,240,240,10);
  gText('PAUSA',CW/2,CH/2-62,18,'#00ffcc',18);
  ctx.font="8px 'Press Start 2P',monospace";ctx.fillStyle='rgba(255,255,255,0.5)';ctx.textAlign='center';
  ctx.fillText('PUNTI: '+punteggio,CW/2,CH/2-12);
  ctx.fillText('LIVELLO: '+livello,CW/2,CH/2+12);
  const d=DIFF[diffScelta];
  ctx.fillStyle=d.color;ctx.fillText(d.label + ' ('+modalitaScelta.toUpperCase()+')',CW/2,CH/2+34);
  
  if (modalitaScelta !== 'timeattack') {
    ctx.font='18px serif';let c='';
    for(let i=0;i<3;i++)c+=i<vite?'♥ ':'♡ ';
    ctx.fillText(c.trim(),CW/2,CH/2+60);
  } else {
    ctx.font="8px 'Press Start 2P',monospace"; ctx.fillStyle='var(--gold)';
    ctx.fillText('TEMPO: ' + tempoResiduo.toFixed(1) + 's', CW/2, CH/2+60);
  }
  if(blink())gText('[ TAP O P PER RIPRENDERE ]',CW/2,CH/2+96,7,'#00ffcc',8);
}

// ════════════════════════════════════════════════════════════════
//  SCREEN: LEVEL UP
// ════════════════════════════════════════════════════════════════
function drawLevelUp(){
  ctx.fillStyle='rgba(7,7,26,0.82)';ctx.fillRect(0,0,CW,CH);
  disegnaParticelle();
  const s2=0.5+levelUpAnim*0.5;
  ctx.save();ctx.translate(CW/2,CH/2);ctx.scale(s2,s2);ctx.translate(-CW/2,-CH/2);
  ctx.globalAlpha=levelUpAnim;
  pannello(CW/2-140,CH/2-80,280,160,12,0.5);
  gText('LEVEL UP!',CW/2,CH/2-22,20,'#ffd600',20);
  gText('LIVELLO '+(livello+1),CW/2,CH/2+18,12,'#00ffcc',14);
  ctx.font="7px 'Press Start 2P',monospace";ctx.textAlign='center';
  ctx.fillStyle='rgba(255,255,255,0.45)';
  const nextN=Math.min(1+Math.floor(livello/DIFF[diffScelta].itemsStep),DIFF[diffScelta].maxItems);
  const curN=numItems();
  ctx.fillText(nextN>curN?'PIÙ OGGETTI!':'PIÙ VELOCITÀ!',CW/2,CH/2+50);
  ctx.restore();ctx.globalAlpha=1;
}

// ════════════════════════════════════════════════════════════════
//  SCREEN: GAME OVER
// ════════════════════════════════════════════════════════════════
function drawGameOver(){
  ctx.fillStyle='rgba(7,7,26,0.94)';ctx.fillRect(0,0,CW,CH);
  sfondoGriglia(0.025);
  pannello(24,44,CW-48,CH-88,12);

  const d=DIFF[diffScelta];
  gText('GAME', CW/2,120,28,'#ff2d78',22);
  gText('OVER', CW/2,160,28,'#ff2d78',22);

  roundRect(CW/2-70,174,140,22,6);
  ctx.fillStyle=`${d.color}22`;ctx.fill();
  ctx.strokeStyle=d.color;ctx.lineWidth=1;ctx.stroke();
  ctx.font="6px 'Press Start 2P',monospace";ctx.fillStyle=d.color;ctx.textAlign='center';
  ctx.fillText(modalitaScelta.toUpperCase() + ' · ' + d.label,CW/2,189);

  ctx.fillStyle='rgba(255,255,255,0.1)';ctx.fillRect(50,202,CW-100,1);

  ctx.font="8px 'Press Start 2P',monospace";ctx.fillStyle='rgba(255,255,255,0.5)';ctx.textAlign='center';
  ctx.fillText('PUNTEGGIO FINALE',CW/2,228);
  gText(String(punteggio).padStart(4,'0'),CW/2,272,30,'#ffd600',22);

  ctx.font="7px 'Press Start 2P',monospace";ctx.fillStyle='rgba(255,255,255,0.3)';
  ctx.fillText('LIVELLO RAGGIUNTO: '+livello,CW/2,300);

  const isRec=punteggio>0&&punteggio>=highScore;
  if(isRec&&blink()){gText('★ NUOVO RECORD! ★',CW/2,330,8,'#ffd600',12);}
  else if(!isRec){
    ctx.font="6px 'Press Start 2P',monospace";ctx.fillStyle='rgba(255,255,255,0.25)';
    ctx.fillText('RECORD: '+String(highScore).padStart(4,'0'),CW/2,330);
  }

  ctx.fillStyle='rgba(255,255,255,0.1)';ctx.fillRect(50,348,CW-100,1);
  ctx.font="7px 'Press Start 2P',monospace";ctx.fillStyle='rgba(0,255,204,0.55)';ctx.textAlign='center';
  ctx.fillText('TOP SCORES',CW/2,372);
  leaderboard.slice(0,3).forEach((e,i)=>{
    const md=['🥇','🥈','🥉'];
    ctx.font='12px serif';ctx.fillText(md[i],CW/2-85,396+i*22);
    ctx.font="6px 'Press Start 2P',monospace";
    ctx.fillStyle=`rgba(255,255,255,${0.7-i*0.15})`;
    ctx.fillText(String(e.pts).padStart(4,'0')+' '+e.diff,CW/2+14,396+i*22);
  });

  if(blink())gText('TAP → CLASSIFICA',CW/2,CH-40,8,'#00ffcc',8);
}

// ════════════════════════════════════════════════════════════════
//  SCREEN: LEADERBOARD
// ════════════════════════════════════════════════════════════════
function drawLeaderboard(){
  ctx.fillStyle='#07071a';ctx.fillRect(0,0,CW,CH);
  sfondoGriglia(0.04);
  pannello(20,20,CW-40,CH-40,12);
  gText('CLASSIFICA',CW/2,70,11,'#ffd600',14);
  ctx.fillStyle='rgba(255,214,0,0.18)';ctx.fillRect(50,84,CW-100,1);

  if(leaderboard.length===0){
    ctx.font="8px 'Press Start 2P',monospace";ctx.textAlign='center';ctx.fillStyle='rgba(255,255,255,0.3)';
    ctx.fillText('NESSUN RECORD',CW/2,CH/2-10);ctx.fillText('GIOCA!',CW/2,CH/2+16);
  } else {
    const md=['🥇','🥈','🥉','  4','  5'];
    const cl=['#ffd600','#c0c0c0','#cd7f32','rgba(255,255,255,0.5)','rgba(255,255,255,0.38)'];
    leaderboard.forEach((e,i)=>{
      const y=120+i*82;
      ctx.fillStyle=i===0?'rgba(255,214,0,0.06)':'rgba(255,255,255,0.02)';
      roundRect(34,y-26,CW-68,66,6);ctx.fill();
      ctx.font='20px serif';ctx.textAlign='left';ctx.fillText(md[i],50,y+8);
      ctx.font="12px 'Press Start 2P',monospace";
      ctx.fillStyle=cl[i];ctx.shadowColor=cl[i];ctx.shadowBlur=i<3?10:0;
      ctx.textAlign='center';ctx.fillText(String(e.pts).padStart(4,'0'),CW/2+10,y+4);ctx.shadowBlur=0;
      
      ctx.font="5px 'Press Start 2P',monospace";
      ctx.fillStyle='rgba(255,255,255,0.4)';
      ctx.fillText(e.diff+' · LV'+e.lv+' · '+e.data,CW/2+10,y+22);
    });
  }
  ctx.fillStyle='rgba(0,255,204,0.1)';ctx.fillRect(50,CH-68,CW-100,1);
  if(blink())gText('TAP PER IL MENU',CW/2,CH-32,8,'#00ffcc',8);
}

// ════════════════════════════════════════════════════════════════
//  GAME LOOP
// ════════════════════════════════════════════════════════════════
function gameLoop(){
  update();
  ctx.clearRect(0,0,CW,CH);
  switch(stato){
    case 'START':       drawStart();       break;
    case 'MODE':        drawMode();        break; 
    case 'DIFFICULTY':  drawDifficulty();  break;
    case 'SETTINGS':    drawSettings();    break;
    case 'TUTORIAL':    drawTutorial();    break;
    case 'GIOCO':       drawGioco();       break;
    case 'PAUSA':       drawPausa();       break;
    case 'LEVELUP':     drawLevelUp();     break;
    case 'GAMEOVER':    drawGameOver();    break;
    case 'LEADERBOARD': drawLeaderboard(); break;
  }
  requestAnimationFrame(gameLoop);
}
gameLoop();
</script>
